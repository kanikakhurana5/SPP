<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Company - Stock Prediction</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ===== RESET & BASE STYLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Light Mode (Default) */
:root {
    --bg-primary: #f5f7fa;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-hover: #f0f3f8;
    --text-primary: #1a2634;
    --text-secondary: #4a5568;
    --text-tertiary: #718096;
    --accent-blue: #2563eb;
    --accent-green: #059669;
    --accent-red: #dc2626;
    --accent-yellow: #d97706;
    --border-color: #e2e8f0;
    --shadow-color: rgba(0, 0, 0, 0.1);
    --input-bg: #f8fafc;
}

/* Dark Mode */
.dark-mode {
    --bg-primary: #0a0c10;
    --bg-secondary: #1a1e24;
    --bg-card: #1e2229;
    --bg-hover: #2a2f38;
    --text-primary: #ffffff;
    --text-secondary: #b2b9c4;
    --text-tertiary: #8b95a1;
    --accent-blue: #2f7be4;
    --accent-green: #00c853;
    --accent-red: #ff3b5c;
    --accent-yellow: #ffb300;
    --border-color: #2f3540;
    --shadow-color: rgba(0, 0, 0, 0.5);
    --input-bg: #262b33;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ===== HEADER STYLES ===== */
header {
    background: var(--bg-secondary);
    color: var(--text-primary);
    padding: 25px 20px;
    border-bottom: 1px solid var(--border-color);
    position: relative;
    z-index: 1;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
}

header h1 {
    font-size: 2.2em;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
}

header h1 i {
    color: var(--accent-blue);
}

/* Theme Toggle */
.theme-toggle {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 40px;
    padding: 8px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-primary);
    transition: all 0.3s ease;
}

.theme-toggle:hover {
    background: var(--bg-hover);
    transform: translateY(-2px);
}

.theme-toggle i {
    font-size: 1.2em;
}

.dark-mode .theme-toggle .fa-sun {
    display: inline-block;
    color: var(--accent-yellow);
}

.dark-mode .theme-toggle .fa-moon {
    display: none;
}

.theme-toggle .fa-sun {
    display: none;
}

/* ===== MAIN CONTAINER ===== */
.container {
    max-width: 550px;
    margin: 60px auto;
    background: var(--bg-card);
    padding: 45px 40px;
    border-radius: 30px;
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 40px var(--shadow-color);
    animation: scaleIn 0.6s ease-out;
}

.container h2 {
    font-size: 2em;
    color: var(--text-primary);
    margin-bottom: 20px;
    text-align: center;
}

.container h2 i {
    color: var(--accent-blue);
    margin-right: 10px;
}

/* Market Status */
.market-status {
    display: inline-flex;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-radius: 40px;
    margin: 15px 0;
    font-size: 0.9em;
    border: 1px solid var(--border-color);
}

.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
}

.status-dot.open {
    background: var(--accent-green);
    box-shadow: 0 0 10px var(--accent-green);
}

.status-dot.closed {
    background: var(--accent-red);
}

/* Company Stats */
.company-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin: 30px 0 20px;
}

.stat-card {
    background: var(--bg-secondary);
    padding: 15px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent-blue);
}

.stat-label {
    color: var(--text-tertiary);
    font-size: 0.85em;
    margin-bottom: 5px;
}

.stat-value {
    color: var(--text-primary);
    font-size: 1.3em;
    font-weight: 700;
    font-family: 'Courier New', monospace;
}

.stat-value.positive {
    color: var(--accent-green);
}

/* Select Dropdown */
select {
    width: 100%;
    padding: 16px 20px;
    margin-top: 30px;
    font-size: 1.1em;
    background: var(--input-bg);
    color: var(--text-primary);
    border: 2px solid var(--border-color);
    border-radius: 16px;
    cursor: pointer;
    outline: none;
    transition: all 0.3s ease;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 20px center;
}

select:hover {
    border-color: var(--accent-blue);
    transform: translateY(-2px);
}

select:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
}

/* Button */
button {
    background: var(--accent-blue);
    color: white;
    padding: 16px 30px;
    border: none;
    border-radius: 16px;
    margin-top: 30px;
    cursor: pointer;
    font-size: 1.2em;
    font-weight: 600;
    width: 100%;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
}

button i {
    transition: transform 0.3s ease;
}

button:hover i {
    transform: translateX(5px);
}

/* Recent Companies */
.recent-companies {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
}

.recent-title {
    color: var(--text-tertiary);
    font-size: 0.9em;
    margin-bottom: 15px;
}

.recent-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.recent-badge {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.9em;
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.recent-badge i {
    color: var(--accent-blue);
}

.recent-badge:hover {
    background: var(--accent-blue);
    color: white;
    transform: translateY(-2px);
}

.recent-badge:hover i {
    color: white;
}

/* Notification */
.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 25px;
    border-radius: 12px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    box-shadow: 0 5px 20px var(--shadow-color);
    z-index: 1000;
    animation: slideIn 0.3s ease-out;
    display: flex;
    align-items: center;
    gap: 10px;
}

.notification.success {
    border-left: 4px solid var(--accent-green);
}

.notification.error {
    border-left: 4px solid var(--accent-red);
}

/* Responsive */
@media (max-width: 768px) {
    header h1 {
        font-size: 1.8em;
    }
    
    .container {
        width: 95%;
        padding: 30px 20px;
        margin: 30px auto;
    }
    
    .company-stats {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 480px) {
    .header-content {
        flex-direction: column;
        text-align: center;
    }
    
    header h1 {
        font-size: 1.5em;
    }
}
</style>

</head>

<body class="light-mode">

<header>
    <div class="header-content">
        <h1>
            <i class="fas fa-chart-line"></i>
            Select Company for Analysis
        </h1>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
            <span>Switch Theme</span>
        </div>
    </div>
</header>

<div class="container">
    
    <h2>
        <i class="fas fa-building"></i>
        Company Selection
    </h2>
    
    <!-- Market Status Indicator -->
    <div class="market-status">
        <span class="status-dot open" id="marketDot"></span>
        <span id="marketText">Checking market status...</span>
    </div>
    
    <!-- Company Stats Cards -->
    <div class="company-stats">
        <div class="stat-card">
            <div class="stat-label">Total Companies</div>
            <div class="stat-value">10</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sectors</div>
            <div class="stat-value">6</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Market Cap</div>
            <div class="stat-value">₹2L - ₹18L Cr</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Live Data</div>
            <div class="stat-value positive">✓ Active</div>
        </div>
    </div>
    
    <!-- Company Selection Dropdown -->
    <select id="companySelect">
        <option value="" disabled selected>-- Select a Company --</option>
        <option value="RELIANCE.NS">🏭 Reliance Industries</option>
        <option value="TCS.NS">💻 Tata Consultancy Services</option>
        <option value="INFY.NS">📊 Infosys</option>
        <option value="HDFCBANK.NS">🏦 HDFC Bank</option>
        <option value="ICICIBANK.NS">🏦 ICICI Bank</option>
        <option value="SBIN.NS">🏦 State Bank of India</option>
        <option value="ITC.NS">📦 ITC Limited</option>
        <option value="LT.NS">🏗️ Larsen & Toubro</option>
        <option value="HINDUNILVR.NS">🧴 Hindustan Unilever</option>
        <option value="BAJFINANCE.NS">💰 Bajaj Finance</option>
    </select>
    
    <!-- Action Button -->
    <button onclick="goToCompanyData()">
        <span>View Company Data</span>
        <i class="fas fa-arrow-right"></i>
    </button>
    
    <!-- Recent Companies Section -->
    <div class="recent-companies">
        <div class="recent-title">
            <i class="fas fa-history"></i>
            Recently Viewed
        </div>
        <div class="recent-badges" id="recentBadges">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>
    
</div>

<script>

// =============================================
// THEME MANAGEMENT
// =============================================

function toggleTheme() {
    const body = document.body;
    if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light');
    } else {
        body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
    }
}

// Load saved theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
    document.body.classList.add('dark-mode');
}

// =============================================
// MARKET STATUS
// =============================================

function updateMarketStatus() {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const hours = today.getHours();
    const minutes = today.getMinutes();
    
    const dot = document.getElementById('marketDot');
    const text = document.getElementById('marketText');
    
    // Check if weekend
    if (dayOfWeek === 0 || dayOfWeek === 6) {
        dot.className = 'status-dot closed';
        text.textContent = 'Market Closed (Weekend)';
        return;
    }
    
    // Check market hours (9:15 AM to 3:30 PM)
    if ((hours > 9 || (hours === 9 && minutes >= 15)) && (hours < 15 || (hours === 15 && minutes <= 30))) {
        dot.className = 'status-dot open';
        text.textContent = 'Market Open';
    } else {
        dot.className = 'status-dot closed';
        text.textContent = 'Market Closed';
    }
}

// =============================================
// COMPANY SELECTION
// =============================================

function goToCompanyData() {
    const company = document.getElementById("companySelect").value;
    
    if (!company) {
        showNotification("Please select a company", "error");
        return;
    }
    
    // Get the selected company name
    const selectElement = document.getElementById("companySelect");
    const selectedText = selectElement.options[selectElement.selectedIndex].text;
    const companyName = selectedText.replace(/[🏭💻📊🏦📦🏗️🧴💰]/g, '').trim();
    
    // Save to localStorage
    localStorage.setItem("selectedCompany", company);
    localStorage.setItem("selectedCompanyName", companyName);
    
    // Save to recent companies
    saveToRecent(company, companyName);
    
    showNotification(`Loading ${companyName} data...`, "success");
    
    setTimeout(() => {
        window.location.href = "company_data.html";
    }, 500);
}

// =============================================
// RECENT COMPANIES
// =============================================

function saveToRecent(companyValue, companyName) {
    let recent = JSON.parse(localStorage.getItem('recentCompanies') || '[]');
    
    recent = recent.filter(c => c.value !== companyValue);
    
    recent.unshift({
        value: companyValue,
        name: companyName,
        timestamp: new Date().toISOString()
    });
    
    recent = recent.slice(0, 5);
    
    localStorage.setItem('recentCompanies', JSON.stringify(recent));
    
    displayRecentCompanies();
}

function displayRecentCompanies() {
    const recent = JSON.parse(localStorage.getItem('recentCompanies') || '[]');
    const badgesContainer = document.getElementById('recentBadges');
    
    if (recent.length === 0) {
        badgesContainer.innerHTML = '<div class="recent-badge"><i class="far fa-clock"></i> No recent companies</div>';
        return;
    }
    
    badgesContainer.innerHTML = recent.map(company => `
        <div class="recent-badge" onclick="selectRecentCompany('${company.value}', '${company.name}')">
            <i class="fas fa-history"></i>
            ${company.name}
        </div>
    `).join('');
}

function selectRecentCompany(companyValue, companyName) {
    const select = document.getElementById('companySelect');
    for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value === companyValue) {
            select.selectedIndex = i;
            break;
        }
    }
    
    showNotification(`Loading ${companyName}...`, "success");
    
    setTimeout(() => {
        localStorage.setItem("selectedCompany", companyValue);
        localStorage.setItem("selectedCompanyName", companyName);
        window.location.href = "company_data.html";
    }, 500);
}

// =============================================
// NOTIFICATION
// =============================================

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `
        <i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
        ${message}
    `;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 2000);
}

// =============================================
// INITIALIZATION
// =============================================

document.addEventListener('DOMContentLoaded', function() {
    updateMarketStatus();
    displayRecentCompanies();
    
    // Update market status every minute
    setInterval(updateMarketStatus, 60000);
});

</script>

</body>
</html>
