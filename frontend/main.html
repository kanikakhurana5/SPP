<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="css/style.css">

<style>
/* ===== RESET & BASE STYLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* Dark Theme Colors - Yahoo Finance Inspired */
    --bg-primary: #0a0c10;
    --bg-secondary: #1a1e24;
    --bg-card: #1e2229;
    --bg-hover: #2a2f38;
    --text-primary: #ffffff;
    --text-secondary: #b2b9c4;
    --text-tertiary: #8b95a1;
    --accent-blue: #2f7be4;
    --accent-green: #00c853;
    --accent-red: #ff3b5c;
    --accent-yellow: #ffb300;
    --border-color: #2f3540;
    --shadow-color: rgba(0, 0, 0, 0.5);
    
    /* Chart Colors */
    --chart-gain: #00c853;
    --chart-loss: #ff3b5c;
    --chart-gradient-start: rgba(47, 123, 228, 0.3);
    --chart-gradient-end: rgba(47, 123, 228, 0.0);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    line-height: 1.6;
    animation: fadeIn 0.8s ease-out;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes pulseGlow {
    0% {
        box-shadow: 0 0 0 0 rgba(47, 123, 228, 0.7);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(47, 123, 228, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(47, 123, 228, 0);
    }
}

@keyframes shimmer {
    0% {
        background-position: -1000px 0;
    }
    100% {
        background-position: 1000px 0;
    }
}

@keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-5px);
    }
    100% {
        transform: translateY(0px);
    }
}

@keyframes rotate {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

/* ===== HEADER STYLES ===== */
header {
    background: linear-gradient(135deg, #0b0f15 0%, #151b24 100%);
    color: var(--text-primary);
    padding: 25px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border-color);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.6s ease-out;
}

header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(47, 123, 228, 0.1), transparent);
    animation: shimmer 3s infinite;
}

header h1 {
    font-size: 2.2em;
    font-weight: 600;
    letter-spacing: 1px;
    margin: 0;
    position: relative;
    display: inline-block;
}

header h1:hover {
    animation: float 2s ease-in-out infinite;
}

/* ===== CONTAINER STYLES ===== */
.container {
    max-width: 1400px;
    width: 95%;
    margin: 30px auto;
    padding: 0 20px;
}

.container h2 {
    font-size: 1.8em;
    color: var(--text-primary);
    margin-bottom: 25px;
    position: relative;
    display: inline-block;
    animation: slideIn 0.6s ease-out;
}

.container h2::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-blue), transparent);
    border-radius: 2px;
}

/* ===== TABLE STYLES ===== */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
    background: transparent;
    margin: 20px 0;
    animation: fadeIn 0.8s ease-out;
}

thead tr {
    animation: slideIn 0.6s ease-out;
}

th {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 16px 12px;
    border: none;
    position: relative;
}

th:first-child {
    border-radius: 12px 0 0 12px;
}

th:last-child {
    border-radius: 0 12px 12px 0;
}

tbody tr {
    background: var(--bg-card);
    border-radius: 12px;
    transition: all 0.3s ease;
    cursor: pointer;
    animation: fadeIn 0.8s ease-out;
    animation-fill-mode: both;
}

tbody tr:nth-child(1) { animation-delay: 0.1s; }
tbody tr:nth-child(2) { animation-delay: 0.2s; }
tbody tr:nth-child(3) { animation-delay: 0.3s; }
tbody tr:nth-child(4) { animation-delay: 0.4s; }
tbody tr:nth-child(5) { animation-delay: 0.5s; }

tbody tr:hover {
    background: var(--bg-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px var(--shadow-color);
}

td {
    padding: 16px 12px;
    border: none;
    color: var(--text-primary);
    font-weight: 500;
}

td:first-child {
    border-radius: 12px 0 0 12px;
    font-weight: 600;
    color: var(--accent-blue);
}

td:last-child {
    border-radius: 0 12px 12px 0;
}

/* Price styling */
td:nth-child(2), td:nth-child(3), td:nth-child(4), td:nth-child(5) {
    font-family: 'Courier New', monospace;
    font-weight: 600;
}

/* Color coding for price changes */
td:nth-child(5) {
    position: relative;
}

td:nth-child(5)::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    border-radius: 3px;
}

/* Add color based on price (you'd need JS for dynamic colors) */

/* ===== CHART CONTAINER STYLES ===== */
.chart-container {
    background: var(--bg-card);
    padding: 25px;
    margin: 40px 0 30px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 24px var(--shadow-color);
    animation: fadeIn 1s ease-out;
    transition: all 0.3s ease;
}

.chart-container:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px var(--shadow-color);
    border-color: var(--accent-blue);
}

/* Chart canvas styling */
#stockChart {
    width: 100%;
    height: 400px;
    border-radius: 12px;
}

/* ===== BUTTON STYLES ===== */
button {
    background: linear-gradient(135deg, var(--accent-blue), #1a4fa8);
    color: var(--text-primary);
    padding: 14px 32px;
    border: none;
    border-radius: 40px;
    margin: 30px 0;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: 600;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(47, 123, 228, 0.3);
    animation: pulseGlow 2s infinite;
}

button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

button:hover {
    background: linear-gradient(135deg, #1a4fa8, var(--accent-blue));
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(47, 123, 228, 0.5);
    animation: none;
}

button:hover::before {
    width: 300px;
    height: 300px;
}

button:active {
    transform: translateY(0);
}

/* Center div styling */
center {
    position: relative;
    padding: 20px 0;
}

/* ===== CUSTOM SCROLLBAR ===== */
::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-blue);
}

/* ===== LOADING ANIMATION ===== */
.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid var(--border-color);
    border-radius: 50%;
    border-top-color: var(--accent-blue);
    animation: rotate 1s linear infinite;
}

/* ===== MARKET STATUS INDICATOR ===== */
.market-status {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--bg-card);
    border-radius: 30px;
    margin-left: 15px;
    font-size: 0.8em;
    border: 1px solid var(--border-color);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulseGlow 1.5s infinite;
}

.status-dot.open {
    background: var(--accent-green);
}

.status-dot.closed {
    background: var(--accent-red);
}

/* ===== RESPONSIVE DESIGN ===== */
@media (max-width: 1024px) {
    .container {
        width: 98%;
        padding: 0 10px;
    }
    
    table {
        font-size: 0.9em;
    }
    
    th, td {
        padding: 12px 8px;
    }
}

@media (max-width: 768px) {
    header h1 {
        font-size: 1.6em;
    }
    
    .container h2 {
        font-size: 1.4em;
    }
    
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    th:first-child, td:first-child {
        position: sticky;
        left: 0;
        background: var(--bg-card);
        z-index: 1;
    }
    
    button {
        width: 90%;
        padding: 14px 20px;
        font-size: 1em;
    }
}

@media (max-width: 480px) {
    header h1 {
        font-size: 1.3em;
    }
    
    .container {
        width: 100%;
        padding: 0 5px;
    }
    
    .chart-container {
        padding: 15px;
    }
}

/* ===== PRINT STYLES ===== */
@media print {
    body {
        background: white;
        color: black;
    }
    
    button {
        display: none;
    }
    
    table {
        border: 1px solid #ddd;
    }
}
</style>

</head>

<body>

<header>
    <h1>📊 Indian Stock Market Dashboard</h1>
</header>

<div class="container">

    <h2>Live Market Data</h2>

    <!-- Table -->
    <table id="stockTable">
        <thead>
            <tr>
                <th>Company</th>
                <th>Open</th>
                <th>High</th>
                <th>Low</th>
                <th>Close</th>
                <th>Volume</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Graph -->
    <div class="chart-container">
        <canvas id="stockChart"></canvas>
    </div>

    <!-- Navigation -->
    <center>
        <button onclick="goToSelection()">Select Company ➜</button>
    </center>

</div>

<script>

const API_URL = "http://127.0.0.1:8000/stocks/live";

async function loadStocks(){

    const response = await fetch(API_URL);
    const data = await response.json();

    const tableBody = document.querySelector("#stockTable tbody");

    let companyNames = [];
    let closingPrices = [];

    data.forEach(stock => {

        const row = `
            <tr>
                <td>${stock.company}</td>
                <td>${stock.open.toFixed(2)}</td>
                <td>${stock.high.toFixed(2)}</td>
                <td>${stock.low.toFixed(2)}</td>
                <td>${stock.close.toFixed(2)}</td>
                <td>${stock.volume}</td>
            </tr>
        `;

        tableBody.innerHTML += row;

        companyNames.push(stock.company);
        closingPrices.push(stock.close);

    });

    createChart(companyNames, closingPrices);
}


function createChart(labels, prices) {
    const ctx = document.getElementById("stockChart").getContext("2d");
    
    // Check if there's an existing chart instance and destroy it
    if (window.stockChartInstance) {
        window.stockChartInstance.destroy();
    }

    // Create gradient backgrounds
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, '#2f7be4');
    gradient.addColorStop(1, '#1a4fa8');

    window.stockChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Closing Price (₹)",
                data: prices,
                backgroundColor: gradient,
                borderColor: '#2f7be4',
                borderWidth: 1,
                borderRadius: 6,
                barPercentage: 0.7,
                categoryPercentage: 0.8,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 1500,
                easing: 'easeInOutQuart'
            },
            plugins: {
                legend: {
                    labels: {
                        color: '#ffffff',
                        font: {
                            size: 14,
                            weight: '500'
                        }
                    }
                },
                tooltip: {
                    backgroundColor: '#1e2229',
                    titleColor: '#ffffff',
                    bodyColor: '#b2b9c4',
                    borderColor: '#2f7be4',
                    borderWidth: 1,
                    padding: 12,
                    cornerRadius: 8,
                    displayColors: false,
                    callbacks: {
                        label: function(context) {
                            return `₹ ${context.parsed.y.toFixed(2)}`;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    grid: {
                        color: '#2f354030',
                        drawBorder: false
                    },
                    ticks: {
                        color: '#8b95a1',
                        callback: function(value) {
                            return '₹' + value.toFixed(0);
                        }
                    }
                },
                x: {
                    grid: {
                        display: false
                    },
                    ticks: {
                        color: '#8b95a1',
                        font: {
                            size: 12
                        }
                    }
                }
            },
            layout: {
                padding: {
                    top: 20,
                    bottom: 20
                }
            }
        }
    });
}


function goToSelection(){
    window.location.href = "select_company.html";
}

loadStocks();

</script>

</body>
</html>
